services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=/app/models
      - LOG_LEVEL=INFO
      - ENABLE_PUBLIC_API=true
      - SHOW_MODEL_DETAILS=false
      - FRONTEND_ORIGIN=http://localhost:3000
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

  ui:
    build: .
    command: ["python", "src/ui/gradio_app.py"]
    ports:
      - "7860:7860"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:8000
